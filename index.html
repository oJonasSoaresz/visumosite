<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIZZUMO | HYPER_REALITY</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff41; /* Verde Matrix de Luxo */
            --bg: #000;
            --font-main: 'Sora', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }
        body { background: var(--bg); color: #fff; font-family: var(--font-main); overflow: hidden; }

        /* Cursor Laser */
        #cursor { position: fixed; width: 4px; height: 4px; background: #fff; border-radius: 50%; z-index: 10000; pointer-events: none; }
        #laser { position: fixed; width: 1px; height: 100vh; background: linear-gradient(to bottom, transparent, var(--primary), transparent); z-index: 9999; pointer-events: none; transition: 0.1s; }
        #laser-h { position: fixed; width: 100vw; height: 1px; background: linear-gradient(to right, transparent, var(--primary), transparent); z-index: 9999; pointer-events: none; transition: 0.1s; }

        /* Interface Matrix / HUD */
        .hud { position: fixed; padding: 30px; z-index: 5000; font-family: var(--font-mono); font-size: 10px; color: var(--primary); text-transform: uppercase; pointer-events: none; }
        .top-left { top: 0; left: 0; }
        .top-right { top: 0; right: 0; text-align: right; }
        .bottom-left { bottom: 0; left: 0; }

        /* Container de Profundidade */
        #scene {
            height: 100vh; width: 100vw;
            perspective: 1000px;
            display: flex; justify-content: center; align-items: center;
        }

        /* Camadas de Conteúdo */
        .layer {
            position: absolute;
            width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 1s cubic-bezier(0.19, 1, 0.22, 1);
            will-change: transform, opacity;
        }

        .hero-text { font-size: 15vw; line-height: 0.8; text-align: center; font-weight: 900; letter-spacing: -10px; }
        .hero-text span { color: transparent; -webkit-text-stroke: 1.5px #fff; }

        /* Projetos como Cartões de Dados */
        .project-card {
            width: 400px; height: 500px; background: #111;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative; overflow: hidden;
            transition: 0.5s;
        }
        .project-card:hover { border-color: var(--primary); transform: scale(1.05); }
        .project-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; filter: contrast(1.2); }
        .project-card:hover img { opacity: 1; filter: contrast(1); }

        .btn-main {
            margin-top: 50px; padding: 20px 40px; border: 1px solid #fff;
            background: transparent; color: #fff; font-family: var(--font-mono);
            letter-spacing: 5px; transition: 0.3s;
        }
        .btn-main:hover { background: #fff; color: #000; box-shadow: 0 0 30px #fff; }

        /* Barra de Progresso Lateral */
        .nav-progress {
            position: fixed; right: 50px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 20px; z-index: 6000;
        }
        .dot { width: 6px; height: 6px; border: 1px solid #fff; border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--primary); border-color: var(--primary); transform: scale(1.5); }

    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="laser"></div>
    <div id="laser-h"></div>

    <div class="hud top-left">VIZZUMO // SYSTEM_V3.0<br>STATUS: ACTIVE<br>LATENCY: 12ms</div>
    <div class="hud top-right">DESIGNING_FUTURE<br>EST. 2026<br>COORD: <span id="coords">0.0, 0.0</span></div>
    <div class="hud bottom-left">SCROLL_TO_DIVE<br>↓↓↓</div>

    <div class="nav-progress" id="dots-nav">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <main id="scene">
        <div class="layer" style="z-index: 3;" id="layer0">
            <h1 class="hero-text">RE-<span>DE</span>-FINE</h1>
            <p style="font-family: var(--font-mono); letter-spacing: 10px; margin-top: 20px;">GASTRONOMIC_LUXURY</p>
        </div>

        <div class="layer" style="z-index: 2; opacity: 0; transform: translateZ(-1000px);" id="layer1">
            <div style="display: flex; gap: 40px;">
                <div class="project-card"><img src="https://images.unsplash.com/photo-1559339352-11d035aa65de?q=80&w=800"></div>
                <div class="project-card" style="margin-top: 100px;"><img src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=800"></div>
            </div>
        </div>

        <div class="layer" style="z-index: 1; opacity: 0; transform: translateZ(-2000px);" id="layer2">
            <h2 style="font-size: 8vw;">WANT_IT?</h2>
            <button class="btn-main">INITIALIZE_CHAT</button>
        </div>
    </main>

    <script>
        const cursor = document.getElementById('cursor');
        const laserV = document.getElementById('laser');
        const laserH = document.getElementById('laser-h');
        const coords = document.getElementById('coords');

        // Cursor & Laser HUD
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            laserV.style.left = e.clientX + 'px';
            laserH.style.top = e.clientY + 'px';
            coords.innerText = `${e.clientX}, ${e.clientY}`;
        });

        // Lógica de "Mergulho" (Z-Scroll)
        let currentLayer = 0;
        const totalLayers = 3;
        const layers = [document.getElementById('layer0'), document.getElementById('layer1'), document.getElementById('layer2')];
        const dots = document.querySelectorAll('.dot');
        let isScrolling = false;

        window.addEventListener('wheel', (e) => {
            if (isScrolling) return;
            isScrolling = true;

            if (e.deltaY > 0 && currentLayer < totalLayers - 1) {
                currentLayer++;
            } else if (e.deltaY < 0 && currentLayer > 0) {
                currentLayer--;
            }

            updateLayers();
            setTimeout(() => { isScrolling = false; }, 1000);
        });

        function updateLayers() {
            layers.forEach((layer, index) => {
                const zDist = (index - currentLayer) * 1000;
                const opacity = index === currentLayer ? 1 : 0;
                layer.style.transform = `translateZ(${zDist}px)`;
                layer.style.opacity = opacity;
                layer.style.pointerEvents = index === currentLayer ? 'all' : 'none';
            });

            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentLayer);
            });
        }

        // Interação 3D com o Mouse nas camadas
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 50;
            const y = (window.innerHeight / 2 - e.clientY) / 50;
            document.getElementById('scene').style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });
    </script>
</body>
</html>
