<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIZZUMO | Branding de Luxo para Gastronomia</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100;300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --petroleo: #004d5a;
            --bg: #050505;
            --white: #ffffff;
            --grey: #808080;
            --sora: 'Sora', sans-serif;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Cursor apenas para Desktop */
        @media (pointer: fine) {
            * { cursor: none; }
            #cursor { position: fixed; width: 8px; height: 8px; background: var(--white); border-radius: 50%; pointer-events: none; z-index: 10001; mix-blend-mode: difference; }
            #cursor-aura { position: fixed; width: 50px; height: 50px; border: 1px solid var(--petroleo); border-radius: 50%; pointer-events: none; z-index: 10000; transition: transform 0.2s var(--ease); }
        }

        body { background: var(--bg); color: var(--white); font-family: var(--sora); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        /* Grão Cinematográfico */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05; pointer-events: none; z-index: 9999;
        }

        /* HEADER */
        header {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 6%; z-index: 1000; transition: 0.5s var(--ease);
        }

        .logo-img { height: 18px; filter: drop-shadow(0 0 15px rgba(0,242,255,0.4)); }
        .nav-links { display: flex; gap: 40px; font-size: 0.6rem; font-weight: 800; letter-spacing: 4px; }
        
        .menu-toggle { display: none; flex-direction: column; gap: 6px; cursor: pointer; }
        .menu-toggle span { width: 25px; height: 2px; background: var(--white); transition: 0.3s; }

        /* HERO */
        .hero {
            position: relative; height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; padding: 0 8%; overflow: hidden;
        }

        .hero-video-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -2; filter: saturate(1.1) brightness(0.6);
        }

        .hero-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 0%, var(--bg) 95%);
            z-index: -1;
        }

        .hero span { color: var(--petroleo); font-weight: 800; font-size: 0.7rem; letter-spacing: 8px; margin-bottom: 20px; }
        .hero h1 { font-size: clamp(2.8rem, 10vw, 8rem); font-weight: 800; line-height: 0.95; letter-spacing: -3px; }
        .hero h1 i { color: transparent; -webkit-text-stroke: 1px var(--white); font-style: normal; }

        /* PROJETOS (POLAROIDS) */
        .projects-section { padding: 100px 8%; background: #020202; }
        .grid-6 {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 60px; perspective: 1500px;
        }

        .polaroid {
            background: #fff; padding: 18px 18px 70px 18px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            transition: transform 0.6s var(--ease), filter 0.6s var(--ease);
            will-change: transform;
        }

        .polaroid-img { width: 100%; aspect-ratio: 1/1; background: #000; overflow: hidden; }
        .polaroid img { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: grayscale(1) brightness(0.7); 
            transition: 0.8s var(--ease); 
        }

        /* Interação Hover (Desktop) */
        @media (pointer: fine) {
            .polaroid:hover { transform: scale(1.05) translateZ(50px); z-index: 10; }
            .polaroid:hover img { filter: grayscale(0) brightness(1); transform: scale(1.1); }
        }

        /* Interação "Revelar" (Mobile/Scroll) */
        .polaroid.revealed { filter: grayscale(0); }
        .polaroid.revealed img { filter: grayscale(0.2) brightness(0.9); }

        .polaroid h3 { color: #111; font-weight: 800; font-size: 1rem; margin-top: 25px; letter-spacing: -1px; }

        /* SERVIÇOS */
        .services-list { padding: 100px 8%; }
        .service-row {
            border-bottom: 1px solid rgba(255,255,255,0.1); padding: 60px 0;
            display: flex; flex-direction: column; position: relative; transition: 0.4s;
        }
        .service-row h4 { font-size: clamp(2.5rem, 7vw, 5rem); font-weight: 800; text-transform: uppercase; }
        .service-desc { font-size: 1rem; color: var(--petroleo); margin-top: 15px; font-weight: 600; opacity: 0.6; }

        /* CTA */
        .cta { height: 90vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--white); color: var(--bg); text-align: center; padding: 0 8%; }
        .cta h2 { font-size: clamp(3rem, 11vw, 9rem); font-weight: 800; line-height: 0.85; margin-bottom: 40px; }
        .cta-btn { padding: 25px 60px; border: 2px solid var(--bg); font-weight: 800; letter-spacing: 4px; text-decoration: none; color: var(--bg); transition: 0.4s; }
        .cta-btn:hover { background: var(--bg); color: var(--white); }

        /* ANIMAÇÕES */
        .reveal { opacity: 0; transform: translateY(40px); transition: 1.2s var(--ease); }
        .revealed { opacity: 1; transform: translateY(0); }

        /* RESPONSIVIDADE */
        @media (max-width: 900px) {
            .nav-links { 
                position: fixed; top: 0; right: -100%; width: 100%; height: 100vh; 
                background: var(--bg); flex-direction: column; justify-content: center; 
                align-items: center; transition: 0.6s var(--ease); z-index: 999; font-size: 1.2rem;
            }
            .nav-links.active { right: 0; }
            .menu-toggle { display: flex; }
            .grid-6 { gap: 40px; }
            .polaroid { padding: 12px 12px 50px 12px; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="cursor-aura"></div>

    <header id="header">
        <img src="Logotipo Tipográfico PNG (3).png" class="logo-img" alt="VIZZUMO">
        <div class="menu-toggle" id="mobile-menu">
            <span></span>
            <span></span>
        </div>
        <nav class="nav-links">
            <span>MANIFESTO</span>
            <span>PORTFÓLIO</span>
            <span>EXPERTISE</span>
            <span>CONTATO</span>
        </nav>
    </header>

    <main>
        <section class="hero">
            <video class="hero-video-bg" autoplay muted loop playsinline>
                <source src="Create_gradient_movement_loop_a48ad9db5e.mp4" type="video/mp4">
            </video>
            <div class="hero-overlay"></div>
            <span class="reveal">ESTÚDIO DE BRANDING</span>
            <h1 class="reveal">DESIGN QUE<br>ALIMENTA O <i>DESEJO</i>.</h1>
        </section>

        <section class="projects-section">
            <div class="grid-6">
                <div class="polaroid reveal" data-tilt>
                    <div class="polaroid-img"><img src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=800"></div>
                    <h3>NOIR BISTRO</h3>
                </div>
                <div class="polaroid reveal" data-tilt>
                    <div class="polaroid-img"><img src="https://images.unsplash.com/photo-1559339352-11d035aa65de?q=80&w=800"></div>
                    <h3>OCEAN GRILL</h3>
                </div>
                <div class="polaroid reveal" data-tilt>
                    <div class="polaroid-img"><img src="https://images.unsplash.com/photo-1550966841-3ee3282270bb?q=80&w=800"></div>
                    <h3>MINIMAL PASTA</h3>
                </div>
                <div class="polaroid reveal" data-tilt>
                    <div class="polaroid-img"><img src="https://images.unsplash.com/photo-1544148103-0773bf10d330?q=80&w=800"></div>
                    <h3>URBAN STEAK</h3>
                </div>
            </div>
        </section>

        <section class="services-list">
            <div class="service-row reveal">
                <h4>Identidade Visual</h4>
                <div class="service-desc">O DNA visual da sua gastronomia.</div>
            </div>
            <div class="service-row reveal">
                <h4>Estratégia</h4>
                <div class="service-desc">Posicionamento focado em ticket médio.</div>
            </div>
        </section>

        <section class="cta">
            <h2 class="reveal">RESERVE SEU<br>LUGAR NO TOPO.</h2>
            <a href="mailto:contato@vizzumo.com.br" class="cta-btn reveal">FALAR COM O ESTÚDIO</a>
        </section>
    </main>

    <script>
        // Cursor customizado (apenas se houver mouse)
        const cursor = document.getElementById('cursor');
        const aura = document.getElementById('cursor-aura');
        if(cursor && window.matchMedia("(pointer: fine)").matches) {
            window.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
                aura.animate({ left: (e.clientX - 25) + 'px', top: (e.clientY - 25) + 'px' }, { duration: 500, fill: "forwards" });
            });
        }

        // Tilt 3D (Apenas Desktop para não quebrar o scroll mobile)
        if (window.matchMedia("(pointer: fine)").matches) {
            document.querySelectorAll('[data-tilt]').forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = (e.clientX - rect.left) - rect.width/2;
                    const y = (e.clientY - rect.top) - rect.height/2;
                    card.style.transform = `perspective(1000px) rotateY(${x/15}deg) rotateX(${-y/15}deg) scale(1.05)`;
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = 'rotateY(0) rotateX(0) scale(1)';
                });
            });
        }

        // Menu Mobile Toggle
        const menuBtn = document.getElementById('mobile-menu');
        const nav = document.querySelector('.nav-links');
        menuBtn.addEventListener('click', () => {
            nav.classList.toggle('active');
            menuBtn.classList.toggle('active');
        });

        // Revelar ao scroll (Intersection Observer)
        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => { 
                if(e.isIntersecting) {
                    e.target.classList.add('revealed');
                }
            });
        }, { threshold: 0.2 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // Header glass effect no scroll
        window.addEventListener('scroll', () => {
            const header = document.getElementById('header');
            header.style.background = window.scrollY > 100 ? "rgba(5,5,5,0.8)" : "transparent";
            header.style.backdropFilter = window.scrollY > 100 ? "blur(10px)" : "none";
        });
    </script>
</body>
</html>
